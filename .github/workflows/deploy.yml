name: Deploy Slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: pnpm
          cache-dependency-path: |
            passkey-slides/pnpm-lock.yaml
            passkey-demo/pnpm-lock.yaml

      - name: Install slides
        working-directory: passkey-slides
        run: pnpm install

      - name: Build slides
        working-directory: passkey-slides
        run: pnpm exec slidev build --base /talks-passkey-intro/

      - name: Install demo
        working-directory: passkey-demo
        run: pnpm install

      - name: Build demo
        working-directory: passkey-demo
        run: pnpm exec vite build --base /talks-passkey-intro/demo/

      - name: Merge demo into slides dist
        run: mv passkey-demo/dist passkey-slides/dist/demo

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: passkey-slides/dist

      - uses: actions/deploy-pages@v4
        id: deployment
